services:
  db:
    image: postgres:17
    container_name: wow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: wow
      POSTGRES_DB: wow_auctions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: