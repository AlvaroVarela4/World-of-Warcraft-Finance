# Recolector de histórico de mercado SIN depender de tu PC.
#
# GitHub ejecuta este workflow cada hora en sus runners y lanza una captura
# (`python scheduler.py --once`) que escribe en un Postgres accesible por
# internet (p. ej. Neon o Supabase, ambos con capa gratuita).
#
# Configuración necesaria (Settings del repo en GitHub):
#   Secrets (Settings → Secrets and variables → Actions → Secrets):
#     BLIZZARD_CLIENT_ID       credenciales de la API de Battle.net
#     BLIZZARD_CLIENT_SECRET
#     DATABASE_URL             URL SQLAlchemy del Postgres cloud, p. ej.
#                              postgresql+psycopg2://user:pass@host/db?sslmode=require
#   Variables (misma página, pestaña Variables) — opcionales:
#     SCHEDULER_REALMS               reinos a seguir, ej: Sanguino,Zul'jin
#                                    (recomendado: pocos reinos; sin definirla
#                                    solo se siguen reinos con snapshots previos)
#     SCHEDULER_INCLUDE_COMMODITIES  "true" para el volcado regional (~200k filas/h)
#
# La primera ejecución contra una BD vacía crea las tablas y puebla el
# registro de reinos automáticamente. Se puede lanzar a mano desde la
# pestaña Actions (workflow_dispatch) para probar la configuración.
#
# Ojo: GitHub desactiva los crons de repos sin actividad durante 60 días;
# cualquier commit los reactiva.

name: collect-market-data

on:
  schedule:
    - cron: "7 * * * *" # minuto 7 de cada hora (el minuto 0 va congestionado y se retrasa más)
  workflow_dispatch: {}

concurrency:
  group: collect-market-data
  cancel-in-progress: false # nunca cortar una captura a medias por solaparse con la siguiente

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55 # menos que el intervalo horario, para no acumular runs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-collector.txt

      - name: Instalar dependencias del recolector
        run: pip install -r requirements-collector.txt

      - name: Capturar snapshot de mercado
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCHEDULER_REALMS: ${{ vars.SCHEDULER_REALMS }}
          SCHEDULER_INCLUDE_COMMODITIES: ${{ vars.SCHEDULER_INCLUDE_COMMODITIES || 'false' }}
        run: python scheduler.py --once
